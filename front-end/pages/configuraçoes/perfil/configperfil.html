<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuracoes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+25&family=Konkhmer+Sleokchher&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="configperfil.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <link rel="shortcut icon" href="/front-end/assets/images/favicon.ico">
</head>

<body>
    <header>
        <button class="botao-menu">
            <i class="fa-solid fa-bars"></i>
        </button>

        <nav class="menu-lateral">

            <div class="perfil">
                <img src="/front-end/assets/images/lebron bb.jpg" alt="logo-usuario">
                <p id="nome-usuario">Lebron BB</p>
            </div>


            <ul>
                <li class="nomes-categorias">Sistema</li>
                <li class="header-list"><a href="#"><i class="fa-solid fa-gears"></i>Configuracoes</a></li>
                <li class="header-list"><a href="/front-end/pages/pagina sobre/index.html"><i
                            class="fa-solid fa-circle-exclamation"></i>Sobre</a></li>
                <li class="header-list"><a href="/front-end/pages/telaInicial/index.html"><i
                            class="fa-solid fa-house"></i>Inicio</a></li>
            </ul>
        </nav>

        <a href="../telaInicial/" id="nome">
            <p>royale concursos</p>
        </a>


    </header>


    <main>
        <h2>Configurações</h2>
    </main>

    <div class="background "></div>

    <div class="config-layout">

        <ul class="links-category">
            <li>
                <a href="../perfil/configperfil.html">
                    <i class="fa-solid fa-user"></i>
                    Perfil
                </a>
            </li>

            <li>
                <a href="../seguranca/configsecu.html">
                    <i class="fa-solid fa-shield"></i>
                    Privacidade e segurança
                </a>
            </li>



        </ul>

        <div class="perfil-container">
            <div class="perfil-card">
                <h2><i class="fa-solid fa-user"></i> Perfil</h2>

                <div class="foto-area">
                    <img id="fotoPerfil" src="./foto-padrao.webp">
                    <input type="file" accept="image/*" id="inputFoto">
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="full-name" placeholder="Digite seu nome completo..." required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-at"></i>
                    <input type="text" id="nickname" placeholder="Digite seu nome de user..." required>
                </div>
            </div>

            <div class="preferencias-card">
                <h2><i class="fa-solid fa-sliders"></i> Preferências</h2>

                <div class="preference-item">
                    <span><i class="fa-solid fa-moon"></i> Tema escuro</span>
                    <label class="switch">
                        <input type="checkbox" id="tema">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="preference-item">
                    <span><i class="fa-solid fa-envelope"></i> Notificações por email</span>
                    <label class="switch">
                        <input type="checkbox" id="notif-email">
                        <span class="slider"></span>
                    </label>
                </div>

            </div>

            <div class="saves">
                <button id="salvar">Salvar alteracoes</button>
            </div>
        </div>

    </div>


</body>

<script src="scrip.js"></script>

</html>
