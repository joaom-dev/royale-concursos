<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Royale Concursos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="shortcut icon" href="/front-end/assets/images/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/front-end/shared/css/temaEscuro.css">
</head>

<body>

    <div class="menu-lateral">
        <div class="menu-topo">
            <img src="/front-end/assets/images/lebron bb.jpg" alt="">
        </div>

        <div class="menu-itens">
            <a href="../telaInicial/index.html">
                <p>Inicial</p>
            </a>
            <a href="../pagina sobre/index.html">
                <p>Sobre</p>
            </a>
            <a href="/front-end/pages/pagina Ranking/Index.html">
                <p>Ranking</p>
            </a>
            <a href="/front-end/pages/paginaMeusConcursos/PgMc.html">
                <p>Salvos</p>
            </a>
            <a href="../pagina assinatura/index.html">
                <p>Assinatura</p>
            </a>
        </div>

        <div class="menu-inferior">
            <a href="../configuraçoes/perfil/configperfil.html">
                <i class="fa-solid fa-gear"></i>
                <span class="tooltip-texto">Configurações</span>
            </a>
        </div>
    </div>

    <header>
        <p id="nome">Explore seus Concursos</p>
        <div class="search-container">
            <input type="text" id="search" placeholder="Pesquise seu concurso...">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
    </header>

    <div class="page-body">

        <aside class="filtros-sidebar">
            <p class="filtros-titulo">Processos Públicos</p>
            <p class="filtros-sub">Filtre sua pesquisa</p>

            <div class="filtro-grupo">
                <div class="filtro-header" onclick="toggleFiltro(this)">
                    <span>Status do processo</span>
                    <i class="fa-solid fa-chevron-down filtro-chevron"></i>
                </div>
                <div class="filtro-body">
                    <label><input type="checkbox" value="open" onchange="aplicarFiltros()"> Inscrições abertas</label>
                    <label><input type="checkbox" value="soon" onchange="aplicarFiltros()"> Encerra em breve</label>
                </div>
            </div>

            <div class="filtro-grupo">
                <div class="filtro-header" onclick="toggleFiltro(this)">
                    <span>Estado</span>
                    <i class="fa-solid fa-chevron-down filtro-chevron"></i>
                </div>
                <div class="filtro-body">
                    <label><input type="checkbox" value="AC" onchange="aplicarFiltros()"> Acre</label>
                    <label><input type="checkbox" value="AL" onchange="aplicarFiltros()"> Alagoas</label>
                    <label><input type="checkbox" value="AP" onchange="aplicarFiltros()"> Amapá</label>
                    <label><input type="checkbox" value="AM" onchange="aplicarFiltros()"> Amazonas</label>
                    <label><input type="checkbox" value="BA" onchange="aplicarFiltros()"> Bahia</label>
                    <label><input type="checkbox" value="CE" onchange="aplicarFiltros()"> Ceará</label>
                    <label><input type="checkbox" value="DF" onchange="aplicarFiltros()"> Distrito Federal</label>
                    <label><input type="checkbox" value="ES" onchange="aplicarFiltros()"> Espírito Santo</label>
                    <label><input type="checkbox" value="GO" onchange="aplicarFiltros()"> Goiás</label>
                    <label><input type="checkbox" value="MA" onchange="aplicarFiltros()"> Maranhão</label>
                    <label><input type="checkbox" value="MT" onchange="aplicarFiltros()"> Mato Grosso</label>
                    <label><input type="checkbox" value="MS" onchange="aplicarFiltros()"> Mato Grosso do Sul</label>
                    <label><input type="checkbox" value="MG" onchange="aplicarFiltros()"> Minas Gerais</label>
                    <label><input type="checkbox" value="PA" onchange="aplicarFiltros()"> Pará</label>
                    <label><input type="checkbox" value="PB" onchange="aplicarFiltros()"> Paraíba</label>
                    <label><input type="checkbox" value="PR" onchange="aplicarFiltros()"> Paraná</label>
                    <label><input type="checkbox" value="PE" onchange="aplicarFiltros()"> Pernambuco</label>
                    <label><input type="checkbox" value="PI" onchange="aplicarFiltros()"> Piauí</label>
                    <label><input type="checkbox" value="RJ" onchange="aplicarFiltros()"> Rio de Janeiro</label>
                    <label><input type="checkbox" value="RN" onchange="aplicarFiltros()"> Rio Grande do Norte</label>
                    <label><input type="checkbox" value="RS" onchange="aplicarFiltros()"> Rio Grande do Sul</label>
                    <label><input type="checkbox" value="RO" onchange="aplicarFiltros()"> Rondônia</label>
                    <label><input type="checkbox" value="RR" onchange="aplicarFiltros()"> Roraima</label>
                    <label><input type="checkbox" value="SC" onchange="aplicarFiltros()"> Santa Catarina</label>
                    <label><input type="checkbox" value="SP" onchange="aplicarFiltros()"> São Paulo</label>
                    <label><input type="checkbox" value="SE" onchange="aplicarFiltros()"> Sergipe</label>
                    <label><input type="checkbox" value="TO" onchange="aplicarFiltros()"> Tocantins</label>
                </div>
            </div>

            <div class="filtro-grupo">
                <div class="filtro-header" onclick="toggleFiltro(this)">
                    <span>Tipo processo</span>
                    <i class="fa-solid fa-chevron-down filtro-chevron"></i>
                </div>
                <div class="filtro-body">
                    <label><input type="checkbox" value="concurso" onchange="aplicarFiltros()"> Concurso Público</label>
                    <label><input type="checkbox" value="seletivo" onchange="aplicarFiltros()"> Processo
                        Seletivo</label>
                    <label><input type="checkbox" value="estagio" onchange="aplicarFiltros()"> Estágio</label>
                </div>
            </div>
        </aside>

        <main class="concursos-main">
            <p class="contagem-label" id="contagem-label">Encontramos <strong>12</strong> Processos Públicos</p>

            <div class="tags-rapidas">
                <span class="tag-rapida ativo" data-tag="all">Todos</span>
                <span class="tag-rapida" data-tag="open">Inscrições abertas</span>
                <span class="tag-rapida" data-tag="soon">Encerra em breve</span>
                <span class="tag-rapida" data-tag="federal">Federal</span>
                <span class="tag-rapida" data-tag="municipal">Municipal</span>
                <span class="tag-rapida" data-tag="estadual">Estadual</span>
            </div>

            <div class="cards-grid" id="cards-grid"></div>
        </main>

    </div>




</body>

<script src="script.js"></script>
<script src="/front-end/shared/js/tema.js"></script>

</html>
